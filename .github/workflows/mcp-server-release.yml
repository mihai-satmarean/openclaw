name: MCP Server Release

on:
  push:
    branches:
      - main
      - feature/mcp-server
    tags:
      - "mcp-v*"
    paths:
      - "packages/mcp-server/**"

concurrency:
  group: mcp-server-release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/openclaw-mcp-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from package.json
        id: pkg
        run: |
          VERSION=$(jq -r .version packages/mcp-server/package.json)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Resolve image tags
        id: tags
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          set -euo pipefail
          tags=()
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            tags+=("${IMAGE}:latest")
            tags+=("${IMAGE}:main")
          fi
          if [[ "${GITHUB_REF}" == refs/heads/feature/* ]]; then
            branch="${GITHUB_REF#refs/heads/}"
            slug="${branch//\//-}"
            tags+=("${IMAGE}:${slug}")
          fi
          if [[ "${GITHUB_REF}" == refs/tags/mcp-v* ]]; then
            tag_version="${GITHUB_REF#refs/tags/mcp-v}"
            tags+=("${IMAGE}:${tag_version}")
            tags+=("${IMAGE}:latest")
          fi
          {
            echo "value<<EOF"
            printf "%s\n" "${tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: packages/mcp-server
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.value }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.pkg.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
